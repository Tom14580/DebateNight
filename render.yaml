services:
  # Backend service
  - type: web
    name: debate-night-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        fromService:
          name: debate-night-frontend
          type: static
          property: url

  # Frontend static site
  - type: static
    name: debate-night-frontend
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: debate-night-backend
          type: web
          property: url